name: 21 Deploy UI (Vite)

on:
  push:
    branches: [main]
    paths:
      - "src/ui/**"
      - ".github/workflows/21_deploy_ui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/ui/package-lock.json

      - name: Install dependencies
        working-directory: src/ui
        run: npm ci

      - name: Resolve backend (src/app) base URL
        id: backend
        run: |
          if [ -n "${{ vars.BACKEND_APP_URL }}" ]; then
            echo "url=${{ vars.BACKEND_APP_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://${{ vars.BACKEND_APP_NAME }}.azurewebsites.net" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: src/ui
        env:
          VITE_APP_BASE_URL: ${{ steps.backend.outputs.url }}
        run: npm run build

      - name: Stage static site for Azure App Service (Linux/Node)
        run: |
          mkdir -p ./publish
          cp -r src/ui/dist/. ./publish/

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.FRONTEND_APP_NAME }}
          package: ./publish
