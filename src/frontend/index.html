<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Claims Team in a Day — Zava Insurance</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <canvas id="renderCanvas" touch-action="none"></canvas>
    <div id="scene-fade" class="scene-fade hidden" aria-hidden="true"></div>
    <header id="topbar">
      <div class="brand">
        <span class="logo">Z</span>
        <div>
          <h1>Zava Claims</h1>
          <p>Claims Team in a Day — live AI simulation</p>
        </div>
      </div>
      <div class="scene-toggle" role="tablist" aria-label="Scene view">
        <button type="button" data-scene="office" class="active" role="tab">Claims Office</button>
        <button type="button" data-scene="neighbourhood" role="tab">Neighbourhood</button>
      </div>
      <div class="metrics">
        <div><span id="metric-submitted">0</span><label>Submitted</label></div>
        <div><span id="metric-processing">0</span><label>In&nbsp;flight</label></div>
        <div><span id="metric-approved">0</span><label>Approved</label></div>
        <div><span id="metric-rejected">0</span><label>Rejected</label></div>
      </div>
      <button
        id="left-nav-toggle"
        type="button"
        class="left-nav-toggle"
        aria-label="Hide AI Agents panel for full page view"
        aria-pressed="false"
        title="Full page view (hide AI Agents panel)"
      >
        <svg
          class="icon-expand"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="4 9 4 4 9 4"></polyline>
          <polyline points="20 9 20 4 15 4"></polyline>
          <polyline points="4 15 4 20 9 20"></polyline>
          <polyline points="20 15 20 20 15 20"></polyline>
        </svg>
        <svg
          class="icon-collapse"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polyline points="9 4 4 4 4 9"></polyline>
          <polyline points="15 4 20 4 20 9"></polyline>
          <polyline points="9 20 4 20 4 15"></polyline>
          <polyline points="15 20 20 20 20 15"></polyline>
        </svg>
      </button>
    </header>

    <div id="now-playing" class="now-playing hidden" role="status" aria-live="polite">
      <div class="np-dot"></div>
      <div class="np-text">
        <div class="np-title"></div>
        <div class="np-narration"></div>
      </div>
      <button type="button" class="np-close" aria-label="Cancel scenario">×</button>
    </div>

    <aside id="agents-panel" class="collapsible">
      <div class="panel-header">
        <h2>AI Agents</h2>
        <button
          type="button"
          class="panel-toggle"
          data-target="agents-panel"
          aria-label="Collapse AI Agents panel"
          aria-expanded="true"
        >−</button>
      </div>
      <div class="panel-body">
        <ul id="agents-list"></ul>
      </div>
    </aside>

    <aside id="log-panel" class="collapsible">
      <div class="panel-header">
        <h2>Activity</h2>
        <button
          type="button"
          class="panel-toggle"
          data-target="log-panel"
          aria-label="Collapse Activity panel"
          aria-expanded="true"
        >−</button>
      </div>
      <div class="panel-body">
        <ol id="log-list"></ol>
      </div>
    </aside>

    <footer id="hint">
      Drag to orbit · Scroll to zoom · Click on a character for their profile · <button id="spawn-btn">Submit a claim</button>
      <span
        class="sim-speed"
        role="group"
        aria-label="Simulation speed"
        title="Simulation speed"
      >
        <span class="sim-speed-label">Speed</span>
        <button type="button" data-speed="1" class="active">x1</button>
        <button type="button" data-speed="2">x2</button>
        <button type="button" data-speed="5">x5</button>
      </span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
