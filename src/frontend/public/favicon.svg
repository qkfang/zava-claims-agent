<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Zava Claims">
  <defs>
    <linearGradient id="zc-shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ff7a59"/>
    </linearGradient>
  </defs>
  <!-- Shield: insurance protection -->
  <path d="M32 4 L56 12 V30 C56 46 44 56 32 60 C20 56 8 46 8 30 V12 Z"
        fill="url(#zc-shield)" stroke="#1c2230" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner claim document -->
  <rect x="20" y="18" width="24" height="28" rx="2.5" fill="#1c2230"/>
  <line x1="24" y1="24" x2="40" y2="24" stroke="#97a3b6" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="36" y2="29" stroke="#97a3b6" stroke-width="2" stroke-linecap="round"/>
  <!-- Checkmark: claim approved -->
  <path d="M23 38 L29 44 L42 31"
        fill="none" stroke="#6dd58c" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
